<!DOCTYPE html>
<html>
<head>
<title>Simple Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#cfd9df;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAV */
nav{
text-align:center;
padding:10px;
}
nav button{
margin:4px;
padding:8px 12px;
border:none;
border-radius:8px;
background:#2c3e50;
color:white;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* BOOK */
.book{
width:90%;
max-width:800px;
height:70vh;
position:relative;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
background:white;
border-radius:10px;
padding:20px;
box-sizing:border-box;
transition:transform 0.6s;
transform-origin:left;
overflow:auto;
}

/* COVER */
.cover{
background:#2c3e50;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* FLIP */
.flipped{
transform:rotateY(-180deg);
pointer-events:none;
}

/* STACK */
.page:nth-child(1){z-index:5;}
.page:nth-child(2){z-index:4;}
.page:nth-child(3){z-index:3;}
.page:nth-child(4){z-index:2;}
.page:nth-child(5){z-index:1;}

/* BUTTONS */
.controls{
position:absolute;
bottom:10px;
width:90%;
display:flex;
justify-content:space-between;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#4ca1af;
color:white;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:10px;
background:#2c3e50;
color:white;
}
</style>

<script>
let current = 1;
const total = 5;

function next(){
if(current < total){
document.querySelectorAll(".page")[current-1].classList.add("flipped");
current++;
}
}

function prev(){
if(current > 1){
current--;
document.querySelectorAll(".page")[current-1].classList.remove("flipped");
}
}

function go(page){
current = page;
let pages = document.querySelectorAll(".page");

pages.forEach(p => p.classList.remove("flipped"));

for(let i=0;i<page-1;i++){
pages[i].classList.add("flipped");
}
}
</script>

</head>

<body>

<!-- NAV -->
<nav>
<button onclick="go(1)">Cover</button>
<button onclick="go(2)">Home</button>
<button onclick="go(3)">Design</button>
<button onclick="go(4)">Gallery</button>
<button onclick="go(5)">About</button>
</nav>

<div class="main">
<div class="book">

<!-- COVER -->
<div class="page cover">
<h1>🌍 Roundabout Project</h1>
<p>Culture • Math • Creativity</p>
<div class="controls">
<button onclick="next()">Open ➡</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<h1>Home</h1>
<!-- ✏️ EDIT HERE -->
<p>Welcome to my project!</p>
<div class="controls">
<button onclick="prev()">⬅ Back</button>
<button onclick="next()">Next ➡</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<h2>Design</h2>
<!-- ✏️ EDIT HERE -->
<p>Explain your design here.</p>
<div class="controls">
<button onclick="prev()">⬅ Back</button>
<button onclick="next()">Next ➡</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<h2>Gallery</h2>
<!-- ✏️ EDIT HERE -->
<p>Add images here</p>
<div class="controls">
<button onclick="prev()">⬅ Back</button>
<button onclick="next()">Next ➡</button>
</div>
</div>

<!-- PAGE 5 -->
<div class="page">
<h2>About</h2>
<!-- ✏️ EDIT HERE -->
<p>Members and info</p>
<div class="controls">
<button onclick="prev()">⬅ Back</button>
</div>
</div>

</div>
</div>

<footer>
<p>© 2026 Roundabout Project</p>
</footer>

</body>
</html>
